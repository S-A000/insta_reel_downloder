<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 250px; padding: 15px; font-family: 'Segoe UI', sans-serif; }
    .status { font-size: 12px; margin-top: 10px; color: #555; }
    input { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { background: #e1306c; color: white; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; }
    button:hover { background: #c13584; }
  </style>
</head>
<body>
  <h3>Insta Pro Downloader</h3>
  <input type="text" id="fileName" placeholder="File ka naam (e.g. MyReel)">
  <button id="dlBtn">Download Video</button>
  <div id="status" class="status">Ready to download...</div>

  <script src="popup.js"></script>
</body>
</html>
